name: Build and Release DMG

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2

      - name: Run Tests
        run: swift test -c release

      - name: Build and Package DMG
        run: |
          chmod +x ./build.sh ./package.sh
          ./package.sh

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: .build/OpenDevUtils.dmg
          generate_release_notes: true

  update-cask:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download DMG and compute SHA256
        id: dmg
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/OpenDevUtils.dmg"
          curl -L -o OpenDevUtils.dmg "$DMG_URL"
          SHA256=$(shasum -a 256 OpenDevUtils.dmg | cut -d' ' -f1)
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "SHA256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Update cask file
        run: |
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/gaoquanao/homebrew-tap.git tap
          sed -i.bak "s/version \".*\"/version \"${{ steps.dmg.outputs.VERSION }}\"/" tap/Casks/opendevutils.rb
          sed -i.bak "s/sha256 \".*\"/sha256 \"${{ steps.dmg.outputs.SHA256 }}\"/" tap/Casks/opendevutils.rb
          rm -f tap/Casks/opendevutils.rb.bak
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Update OpenDevUtils to v${{ steps.dmg.outputs.VERSION }}"
          git push
